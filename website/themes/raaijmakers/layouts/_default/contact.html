{{ define "main" }}
<div class="page-header">
  <h1>{{ .Title }}</h1>
</div>
<form
  class="contact-form"
  id="contact-form"
  action="https://formspree.io/f/meewpvza"
  method="POST"
>
  <div class="form-group">
    <label for="name">{{ i18n "contactName" }}</label>
    <input type="text" id="name" name="name" maxlength="100" required />
  </div>
  <div class="form-group">
    <label for="email">{{ i18n "contactEmail" }}</label>
    <input type="email" id="email" name="email" maxlength="254" required />
  </div>
  <div class="form-group">
    <label for="message">{{ i18n "contactMessage" }}</label>
    <textarea
      id="message"
      name="message"
      rows="6"
      maxlength="5000"
      required
    ></textarea>
  </div>
  <div
    class="cf-turnstile"
    data-sitekey="{{ .Site.Params.turnstileSiteKey }}"
    data-theme="auto"
  ></div>
  <button type="submit" class="form-submit">{{ i18n "contactSend" }}</button>
  <p class="form-status" id="form-status"></p>
  <p class="form-rate-limit-notice">{{ i18n "contactRateLimitNotice" }}</p>
</form>
