<!doctype html>
<html lang="{{ .Language.Lang }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
{{ partial "header.html" . }}
<main>
  {{ block "main" . }}{{ end }}
</main>
{{ partial "footer.html" . }}
{{ block "cornerAvatar" . -}}
<a href="{{ "/contact/" | relLangURL }}" class="corner-avatar-link">
  <img src="/images/avatar.webp" alt="" class="corner-avatar">
</a>
{{ end -}}
<script src="/js/theme-toggle.js"></script>
{{ block "scripts" . }}{{ end }}
</body>
</html>
